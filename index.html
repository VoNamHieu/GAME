<!doctype html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover' />
    <meta charset='utf-8'>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <style></style>
    <title>Om Nom Run</title>
</head>
<body>

    <div id="application-splash-wrapper">
        <div id="application-splash">
            <div id="loaderBar"></div>
            <span id="loadingText">0%</span>
        </div>
        <img id="logo" src="img/logo.png">
    </div>

    <!-- All scripts AFTER body content so document.body exists -->
    <script>
        window.famobi_gameID = "om-nom-run";
        window.ENABLE_PRIVACY_POLICY_AND_TOS = false;
        window.OPEN_TERMS_OF_SERVICE = function() {};
        window.OPEN_PRIVACY_POLICY = function() {};

        // ============================================================
        // Famobi API stubs for standalone/offline mode
        // IMPORTANT: Do NOT use Proxy on window.famobi - it makes all
        // property checks truthy, breaking offline fallback logic
        // (e.g. reward granting, ad skip paths)
        // ============================================================
        var _p = Promise.resolve();
        var _noop = function() {};
        var _noopP = function() { return _p; }; // no-op returning Promise

        window.famobi = window.famobi || {};

        // Core API
        window.famobi.log = _noop;
        window.famobi.playerReady = _noop;
        window.famobi.gameReady = _noop;
        window.famobi.getCurrentLanguage = function() { return 'en'; };
        window.famobi.getVolume = function() { return 1; };
        window.famobi.setPreloadProgress = _noop;
        window.famobi.setGameplayStart = _noop;
        window.famobi.setGameplayStop = _noop;
        window.famobi.hasFeature = function() { return false; };
        window.famobi.onRequest = function(event, cb) { if(cb) cb(); };
        window.famobi.getMoreGamesURL = function() { return ''; };

        // Tracking - must return Promise (game chains .then())
        window.famobi.trackEvent = _noopP;
        window.famobi.trackStats = _noopP;
        window.famobi.submitHighscore = _noopP;
        window.famobi.submitScore = _noopP;

        // Ads - must return Promise (used in Promise.all)
        window.famobi.hasRewardedAd = function() { return false; };
        window.famobi.hasPrerollAd = function() { return false; };
        window.famobi.hasInterstitialAd = function() { return false; };
        window.famobi.showAd = function(cfg) {
            if(cfg && cfg.adFinished) cfg.adFinished();
            return _p;
        };
        window.famobi.rewardedAd = function(cb) {
            if(typeof cb === 'function') cb({rewardGranted: false});
            else if(cb && cb.adFinished) cb.adFinished();
            return _p;
        };
        window.famobi.showRewardedAd = function(cb) {
            if(typeof cb === 'function') cb({rewardGranted: false});
            return _p;
        };
        window.famobi.showInterstitialAd = _noopP;
        window.famobi.requestAd = _noopP;
        window.famobi.showBanner = _noopP;

        // Branding
        window.famobi.getBrandingButtonImage = function() { return ''; };
        window.famobi.getBrandingLogoImage = function() { return ''; };
        window.famobi.getBrandingData = function() { return {}; };
        window.famobi.getPrivacySettings = function() { return {}; };

        // LocalStorage
        window.famobi.localStorage = {
            getItem: function(key) { try { return localStorage.getItem(key); } catch(e) { return null; } },
            setItem: function(key, val) { try { localStorage.setItem(key, val); } catch(e) {} },
            removeItem: function(key) { try { localStorage.removeItem(key); } catch(e) {} }
        };

        // ============================================================
        // Famobi Analytics / Tracking API stub
        // Uses Proxy because it's ONLY used for tracking (always returns Promises)
        // ============================================================
        window.famobi_analytics = new Proxy({
            trackEvent: _noopP,
            trackStats: _noopP,
            trackScreen: _noopP,
            trackAdEvent: _noopP,
            submitScore: _noopP,
            submitHighscore: _noopP,
            setScore: _noop,
            getScore: function() { return 0; },
            setLevel: _noop,
            getLevel: function() { return 1; },
            setCustomVar: _noop,
            log: _noop
        }, {
            get: function(target, prop) {
                if (prop in target) return target[prop];
                if (typeof prop === 'symbol') return undefined;
                return _noopP;
            }
        });

        // ============================================================
        // Global error handler: suppress remaining non-critical errors
        // ============================================================
        window.addEventListener('error', function(e) {
            var msg = e.message || '';
            if (msg.indexOf('trackEvent') !== -1 ||
                msg.indexOf('BrandingImage') !== -1 ||
                msg.indexOf('Tracking') !== -1 ||
                msg.indexOf('famobi') !== -1 ||
                msg.indexOf('is not a function') !== -1) {
                console.warn('[PATCH] Suppressed error:', msg);
                e.preventDefault();
                return true;
            }
        });

        // Safety timeout: force-hide splash if loading hangs
        window._loadingTimeout = setTimeout(function() {
            console.warn('[PATCH] Loading timeout after 60s, force-hiding splash');
            var splash = document.getElementById('application-splash-wrapper');
            if (splash && splash.parentElement) splash.parentElement.removeChild(splash);
        }, 60000);

        var _origGameReady = window.famobi.gameReady;
        window.famobi.gameReady = function() {
            clearTimeout(window._loadingTimeout);
            if (_origGameReady) _origGameReady();
        };
    </script>

    <script src="preloader.js"></script>
    <script src="playcanvas-stable.min.js"></script>
    <script>
        // Monkey-patch PlayCanvas _scriptMethod to catch script errors
        // Without this, any error in ApiController (trackEvent etc.)
        // breaks the entire update/initialize chain and freezes the game
        (function() {
            var proto = pc.ScriptComponentSystem.prototype;
            var orig = proto._scriptMethod;
            proto._scriptMethod = function(t, e, i) {
                try {
                    orig.call(this, t, e, i);
                } catch(err) {
                    console.warn('[PATCH] Script error in', e, ':', err.message);
                }
            };
        })();
    </script>
    <script src="__settings__.js"></script>
    <script src="__modules__.js"></script>
    <script src="__start__.js"></script>
    <script src="__loading__.js"></script>

</body>
</html>
